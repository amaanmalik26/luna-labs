<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg?v=4" />
		<link rel="icon" type="image/png" sizes="512x512" href="%sveltekit.assets%/favicon.png?v=4" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico?v=4" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/apple-touch-icon.png?v=4"
		/>
		<meta name="theme-color" content="#0d0d0e" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
